<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GhostMail | Secure Disposable Email</title>

    <script src="https://kit.fontawesome.com/2b2869e88a.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="diff.css">
</head>

<body class="flex flex-col min-h-screen pa-x2 pa-y1 items-center">
    <nav class="max-w-56 flex items-center mb-2">
        <div class="flex items-center gap-p75">
            <i class="fa-solid fa-ghost" style="color: rgba(116, 192, 252, 1); font-size: 1.8rem;"></i>
            <span class="text-white letter-space-p5 font-size-1p5 font-b700">
                GHOST~
                    <span style=" color: rgba(116, 192, 252, 1);">
                        MAIL
                    </span>
                </span>
        </div>
    </nav>

    <hr>

    <main class="w-full max-w-42 relative">

        <!-- Ad-slot -->
        <div class="AdSlot flex align-center justify-center w-full"> 
            <p> ADVERTISEMENT SPACE </p>
        </div>

        <!-- inbox -->
        <div class="glass-panel overflow-hidden min-h-400px relative mb-4">
            <div class="flex pa-1p5 justify-between items-center" style="border-bottom: 1px solid rgb(255 255 255 / 0.05)">
                <h3 class="letter-space-1 font-b700 font-grey-sp75">
                    <i class="fa-solid fa-inbox" style="color: #2563eb;"></i> 
                    INBOX
                </h3>
                <span class="text-blue font-b700 pa-xp5 pa-yp25 plate-blue bradius-p25" style="font-size: 0.75rem;">0</span>
            </div>

            <div id="inbox-list" class="max-h-500px overflow-y-auto">
                <div class="pa-5 items-center justify-center flex-col flex ">
                    <i class="fa-solid fa-envelope-open-text text-2xl"></i>
                </div>
            </div>
        </div>
       

        <!-- Blog / Articles Section -->
        <section class="w-full">
            <div class="flex items-center justify-between mb-1p5 pa-xp5">
                <h2 class="text-xl font-b700 text-white flex items-center gap-p5">
                    <i class="fa-solid fa-shield-halved text-blue"></i> Security Insights
                </h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-1p5">
                <!-- Article 1 -->
                <article class="glass-card ">
                    <div class="flex justify-between">
                        <span class="bg-blue-500/10 text-blue-400 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider border border-blue-500/20">Privacy</span>
                        <span class="text-slate-500 text-xs font-mono">Oct 12, 2025</span>
                    </div>

                    <h3 class="text-lg font-bold mb-2 text-slate-200 group-hover:text-blue-400 transition-colors">Why Temporary Email is Essential in 2026</h3>
                    <p class="text-slate-400 text-sm leading-relaxed mb-4">Data brokers are more aggressive than ever. Learn how disposable identities shield your primary inbox from tracking pixels.</p>

                    <div class="flex items-center gap-2 text-xs text-slate-500">
                        <i class="fa-regular fa-clock"></i> 3 min read
                    </div>
                </article>
            </div>
        </section>
        
        
        <!-- Ad-slot -->
        <div class="AdSlot flex align-center justify-center w-full"> 
            <p> ADVERTISEMENT SPACE </p>
        </div>

   </main>

   <hr>

</body>
</html>
